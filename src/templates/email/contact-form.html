<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <title>New contact form message</title>
    <style>
      @media (prefers-color-scheme: dark) {
        .body-bg {
          background-color: #0f1115 !important;
        }
        .card {
          background-color: #181b21 !important;
          border-color: #2a2f3a !important;
        }
        .title {
          color: #f3f4f6 !important;
        }
        .label,
        .footer {
          color: #9aa3b2 !important;
        }
        .value,
        .message {
          color: #e5e7eb !important;
        }
        .divider {
          border-color: #2a2f3a !important;
        }
        .link {
          color: #6ea8fe !important;
        }
      }
    </style>
  </head>
  <body
    class="body-bg"
    style="
      margin: 0;
      padding: 24px;
      background-color: #f4f5f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      line-height: 1.6;
      color: #1f2933;
    "
  >
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
      <tr>
        <td align="center">
          <table
            role="presentation"
            class="card"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="
              max-width: 600px;
              background-color: #ffffff;
              border: 1px solid #e3e6ea;
              border-radius: 10px;
            "
          >
            <!-- Header -->
            <tr>
              <td style="padding: 28px 32px 0 32px">
                <p
                  class="title"
                  style="margin: 0; font-size: 18px; font-weight: 600; color: #1f2933"
                >
                  New message from your contact form
                </p>
              </td>
            </tr>

            <!-- Details -->
            <tr>
              <td style="padding: 24px 32px 4px 32px">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td
                      class="label"
                      width="96"
                      valign="top"
                      style="padding: 6px 0; font-size: 14px; color: #6b7280; font-weight: 600"
                    >
                      Name
                    </td>
                    <td
                      class="value"
                      valign="top"
                      style="padding: 6px 0; font-size: 14px; color: #1f2933"
                    >
                      {{name}}
                    </td>
                  </tr>
                  <tr>
                    <td
                      class="label"
                      width="96"
                      valign="top"
                      style="padding: 6px 0; font-size: 14px; color: #6b7280; font-weight: 600"
                    >
                      Email
                    </td>
                    <td valign="top" style="padding: 6px 0; font-size: 14px">
                      <a
                        href="mailto:{{email}}"
                        class="link"
                        style="color: #2563eb; text-decoration: none"
                        >{{email}}</a
                      >
                    </td>
                  </tr>
                  <tr>
                    <td
                      class="label"
                      width="96"
                      valign="top"
                      style="padding: 6px 0; font-size: 14px; color: #6b7280; font-weight: 600"
                    >
                      Subject
                    </td>
                    <td
                      class="value"
                      valign="top"
                      style="padding: 6px 0; font-size: 14px; color: #1f2933"
                    >
                      {{subject}}
                    </td>
                  </tr>
                  <tr>
                    <td
                      class="label"
                      width="96"
                      valign="top"
                      style="padding: 6px 0; font-size: 14px; color: #6b7280; font-weight: 600"
                    >
                      Received
                    </td>
                    <td
                      class="value"
                      valign="top"
                      style="padding: 6px 0; font-size: 14px; color: #1f2933"
                    >
                      {{timestamp}}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td style="padding: 20px 32px 0 32px">
                <hr
                  class="divider"
                  style="border: none; border-top: 1px solid #e3e6ea; margin: 0"
                />
              </td>
            </tr>

            <!-- Message -->
            <tr>
              <td style="padding: 20px 32px 0 32px">
                <p
                  class="label"
                  style="margin: 0 0 10px 0; font-size: 14px; color: #6b7280; font-weight: 600"
                >
                  Message
                </p>
                <div
                  class="message"
                  style="
                    font-size: 15px;
                    line-height: 1.6;
                    color: #1f2933;
                    white-space: pre-wrap;
                    word-break: break-word;
                  "
                >
                  {{message}}
                </div>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding: 28px 32px 28px 32px">
                <p class="footer" style="margin: 0; font-size: 12px; color: #9ca3af">
                  Sent from the davie3.com contact form
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
